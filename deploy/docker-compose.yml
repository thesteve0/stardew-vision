services:

  pierres-buying-tool:
    build:
      context: ..
      dockerfile: services/pierres-buying-tool/Dockerfile
    ports:
      - "8002:8002"
    restart: unless-stopped

  tts-tool:
    build:
      context: ..
      dockerfile: services/tts-tool/Dockerfile
    ports:
      - "8003:8003"
    environment:
      HF_HOME: /root/.cache/huggingface
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    restart: unless-stopped

  coordinator:
    build:
      context: ..
      dockerfile: services/coordinator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PIERRES_BUYING_TOOL_URL: http://pierres-buying-tool:8002
      TTS_TOOL_URL: http://tts-tool:8003
      # vLLM runs on the host machine — host.docker.internal resolves to host
      VLLM_BASE_URL: http://host.docker.internal:8001/v1
      VLLM_MODEL: Qwen/Qwen2.5-VL-7B-Instruct
    depends_on:
      - pierres-buying-tool
      - tts-tool
    restart: unless-stopped

volumes:
  huggingface-cache:
