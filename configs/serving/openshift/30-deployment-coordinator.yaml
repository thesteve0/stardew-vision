apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: stardew-vision
  labels:
    app: stardew-vision
    component: coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      component: coordinator
  template:
    metadata:
      labels:
        app: stardew-vision
        component: coordinator
    spec:
      containers:
        - name: coordinator
          image: ghcr.io/thesteve0/stardew-coordinator:v0.7.3
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: service-endpoints
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: errors
              mountPath: /app/datasets/errors
      volumes:
        - name: errors
          persistentVolumeClaim:
            claimName: error-screenshots
---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
  namespace: stardew-vision
spec:
  selector:
    component: coordinator
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: stardew-vision
  namespace: stardew-vision
  annotations:
    # Increase timeout for first request (OCR model loading takes ~30s)
    # Subsequent requests are fast (~5-10s total) once models are in memory
    haproxy.router.openshift.io/timeout: 3m
spec:
  to:
    kind: Service
    name: coordinator
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
