# Optional: PersistentVolumeClaim for model caching
# Prevents re-downloading model on every pod restart
# Without this, model downloads every restart (~3.5 min)
# With this, restart time is ~30 seconds
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: stardew-vision
  labels:
    app: stardew-vision
    component: vllm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi  # Enough for multiple models
  # storageClassName: gp3-csi  # Uncomment and adjust for your cluster
