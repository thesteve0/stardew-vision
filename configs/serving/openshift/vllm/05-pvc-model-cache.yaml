# PersistentVolumeClaim for caching the base Qwen2.5-VL-7B-Instruct model.
# Uses EFS (ReadWriteMany) so both the base and fine-tuned predictor pods
# can share the same model files, eliminating ~4 min download on every restart.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: stardew-vision
  labels:
    app: stardew-vision
    component: vllm
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: efs-csi
