apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: stardew-vlm
  namespace: stardew-vision
  labels:
    app: stardew-vision
    component: vllm
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/dashboard: "true"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    # GPU scheduling configuration
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    nodeSelector:
      nvidia.com/gpu.present: "true"
    # Model configuration
    model:
      modelFormat:
        name: vLLM
      runtime: stardew-vlm
      storageUri: pvc://vllm-model-cache
      # vLLM runtime arguments
      # CRITICAL: Use --flag=value format, no spaces in JSON
      args:
        - --max-model-len=8192
        - --limit-mm-per-prompt={"image":1}
        - --enable-auto-tool-choice
        - --tool-call-parser=hermes
        - --chat-template=/mnt/chat-template/chat_template.jinja
        - --max-num-seqs=1
        - --gpu-memory-utilization=0.95
        - --enable-prefix-caching
      # Resource requests and limits
      resources:
        requests:
          cpu: "4"
          memory: 24Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: 32Gi
          nvidia.com/gpu: "1"
