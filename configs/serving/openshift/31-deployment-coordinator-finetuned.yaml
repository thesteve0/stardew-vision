apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator-finetuned
  namespace: stardew-vision
  labels:
    app: stardew-vision
    component: coordinator-finetuned
spec:
  replicas: 1
  selector:
    matchLabels:
      component: coordinator-finetuned
  template:
    metadata:
      labels:
        app: stardew-vision
        component: coordinator-finetuned
    spec:
      containers:
        - name: coordinator
          image: ghcr.io/thesteve0/stardew-coordinator:v0.8.1
          # Use the switchable entrypoint that reads AGENT_MODE
          command: ["uv", "run", "python", "-m", "uvicorn",
                    "stardew_coordinator.app_finetuned:app",
                    "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: service-endpoints-finetuned
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: errors
              mountPath: /app/datasets/errors
      volumes:
        - name: errors
          persistentVolumeClaim:
            claimName: error-screenshots
---
apiVersion: v1
kind: Service
metadata:
  name: coordinator-finetuned
  namespace: stardew-vision
spec:
  selector:
    component: coordinator-finetuned
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: stardew-vision-finetuned
  namespace: stardew-vision
  annotations:
    haproxy.router.openshift.io/timeout: 3m
spec:
  to:
    kind: Service
    name: coordinator-finetuned
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
