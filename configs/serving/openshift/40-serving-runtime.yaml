apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: stardew-vision
spec:
  supportedModelFormats:
    - name: pytorch
      version: "2"
      autoSelect: true
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:v0.6.4.post1
      command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
      args:
        - --model=/mnt/models
        - --dtype=float16
        - --max-model-len=4096
        - --enable-auto-tool-choice
        - --tool-call-parser=hermes
        - --chat-template=/mnt/chat-template/qwen2_5_vl_tool_template.jinja
        - --port=8080
        - --limit-mm-per-prompt=image=1
      env:
        - name: HUGGING_FACE_HUB_TOKEN
          value: ""  # Not needed for public models
      resources:
        requests:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: 20Gi
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: chat-template
          mountPath: /mnt/chat-template
          readOnly: true
  volumes:
    - name: chat-template
      configMap:
        name: vllm-chat-template
